name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install
        run: bun install --frozen-lockfile

      - name: Gate
        run: bun run gate

      - name: E2E
        run: bun run test:e2e
