pre-commit:
  parallel: true
  jobs:
    - name: lint+fmt
      run: bun run lint:fix && bun run fmt
      stage_fixed: true
    - name: typecheck
      run: bun run typecheck
    - name: typecheck:locks
      run: bun run typecheck:locks
    - name: build
      run: bun run build
    - name: test
      run: bun run test
